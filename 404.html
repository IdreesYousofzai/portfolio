<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | Ahmad Idrees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/main.css"/>
  <link rel="stylesheet" href="assets/css/components.css"/>
  <style>
    .error-page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-2xl);
      position: relative;
      overflow: hidden;
    }

    .error-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(59,130,246,0.08), transparent 60%);
      pointer-events: none;
    }

    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 1;
      background: linear-gradient(135deg, rgba(248,250,252,0.15), rgba(148,163,184,0.08));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 1;
      user-select: none;
    }

    .error-code::after {
      content: '404';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent), #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.25;
      filter: blur(20px);
    }

    .error-title {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: var(--space-md);
      position: relative;
      z-index: 1;
    }

    .error-sub {
      font-size: 1rem;
      color: var(--text-secondary);
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: var(--space-2xl);
      position: relative;
      z-index: 1;
    }

    .error-links {
      display: flex;
      gap: var(--space-md);
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .error-nav {
      display: flex;
      gap: var(--space-lg);
      flex-wrap: wrap;
      justify-content: center;
      margin-top: var(--space-3xl);
      position: relative;
      z-index: 1;
    }

    .error-nav a {
      font-size: 0.82rem;
      color: var(--text-secondary);
      transition: color var(--duration-fast);
      font-weight: 500;
    }

    .error-nav a:hover { color: var(--accent); }

    .mono-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: var(--space-md);
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <header id="navbar" role="banner"></header>

  <main id="main-content">
    <div class="error-page">
      <div class="error-bg" aria-hidden="true"></div>

      <div class="mono-label">Error 404</div>
      <div class="error-code" aria-hidden="true">404</div>

      <h1 class="error-title">Page not found</h1>
      <p class="error-sub">
        The page you're looking for doesn't exist, may have been moved, or the URL might have a typo. Let's get you back on track.
      </p>

      <div class="error-links">
        <a href="index.html" class="btn btn-primary" data-magnetic>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Go Home
        </a>
        <a href="projects.html" class="btn btn-outline" data-magnetic>View Projects</a>
      </div>

      <nav class="error-nav" aria-label="Quick navigation">
        <a href="about.html">About</a>
        <a href="experience.html">Experience</a>
        <a href="certifications.html">Certifications</a>
        <a href="articles.html">Articles</a>
        <a href="cv.html">CV</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </main>

  <footer role="contentinfo"></footer>

  <script type="module">
    import { initTheme, initCursor, initNavbar, initBackToTop } from './assets/js/main.js';
    import { injectLayout } from './assets/js/layout.js';
    import { initCommandPalette } from './assets/js/command-palette.js';
    import { initMagneticButtons } from './assets/js/animations.js';

    injectLayout();
    initTheme();
    initNavbar();
    initBackToTop();
    initCommandPalette();
    initCursor();
    initMagneticButtons();
  </script>
</body>
</html>
