<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Certifications and qualifications earned by Ahmad Idrees Yousofzai."/>
  <title>Certifications — Ahmad Idrees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/main.css"/>
  <link rel="stylesheet" href="assets/css/components.css"/>
  <style>
    .certs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-xl);
    }

    @media (max-width: 1024px) { .certs-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 640px)  { .certs-grid { grid-template-columns: 1fr; } }

    .cert-card-full {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: var(--space-xl);
      backdrop-filter: blur(12px);
      transition: all var(--duration-base) var(--ease-smooth);
      cursor: none;
      position: relative;
      overflow: hidden;
    }

    .cert-card-full::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), #8B5CF6);
      opacity: 0;
      transition: opacity var(--duration-base);
    }

    .cert-card-full:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-glow), var(--shadow-md);
      transform: translateY(-4px);
    }

    .cert-card-full:hover::before { opacity: 1; }

    .cert-card-icon { font-size: 2.5rem; margin-bottom: var(--space-md); line-height: 1; }
    .cert-card-title { font-size: 1rem; font-weight: 700; line-height: 1.35; margin-bottom: var(--space-xs); }
    .cert-card-issuer { font-size: 0.8rem; color: var(--accent); font-weight: 600; }
    .cert-card-date { font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-secondary); margin-top: 4px; }
    .cert-card-desc { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.65; margin-top: var(--space-md); }
    .cert-card-skills { display: flex; flex-wrap: wrap; gap: var(--space-xs); margin-top: var(--space-md); }

    .cert-category-badge {
      position: absolute;
      top: var(--space-md);
      right: var(--space-md);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: var(--radius-full);
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
    }

    .modal-cert-icon { font-size: 3rem; margin-bottom: var(--space-md); }
    .modal-cert-title { font-size: 1.2rem; font-weight: 700; line-height: 1.3; }
    .modal-cert-issuer { color: var(--accent); font-weight: 600; margin-top: 4px; }
    .modal-cert-date   { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px; margin-bottom: var(--space-md); }
    .modal-cert-desc   { color: var(--text-secondary); font-size: 0.875rem; line-height: 1.75; }
    .modal-cert-skills { display: flex; flex-wrap: wrap; gap: var(--space-xs); margin-top: var(--space-lg); }

    @keyframes certIn {
      from { opacity:0; transform:translateY(20px) scale(0.98); }
      to   { opacity:1; transform:none; }
    }

    .cert-card-full { animation: certIn 0.4s ease both; }
  </style>
</head>
<body>
  <header id="navbar" role="banner"></header>

  <main id="main-content">

    <!-- Hero -->
    <section class="page-hero" style="background:var(--bg-secondary)">
      <div class="page-hero-bg" style="background:radial-gradient(ellipse 65% 55% at 50% 40%, rgba(139,92,246,0.1), transparent 60%)"></div>
      <div class="container page-hero-content">
        <div class="section-label hero-reveal">Qualifications</div>
        <h1 class="text-headline hero-reveal" data-delay="80">
          Certifications &<br><span style="color:var(--accent)">Achievements</span>
        </h1>
        <p style="color:var(--text-secondary);font-size:1.05rem;max-width:520px;line-height:1.75;margin-top:var(--space-md)" class="hero-reveal" data-delay="160">
          Every certificate represents hours of study and a genuine commitment to growing as a developer.
        </p>
        <div class="stats-row hero-reveal" style="margin-top:var(--space-xl)" data-delay="240">
          <div class="stat-item">
            <div class="stat-number"><span data-count="8">0</span></div>
            <div class="stat-label">Certificates</div>
          </div>
          <div class="stat-item">
            <div class="stat-number"><span data-count="5">0</span></div>
            <div class="stat-label">Categories</div>
          </div>
          <div class="stat-item">
            <div class="stat-number"><span data-count="2025">0</span></div>
            <div class="stat-label">Most recent</div>
          </div>
        </div>
      </div>
    </section>

    <!-- Certs content -->
    <section class="section" style="background:var(--bg-primary)">
      <div class="container">
        <!-- Controls -->
        <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:var(--space-lg);margin-bottom:var(--space-2xl)">
          <div class="filter-tabs" id="cert-filters" role="group" aria-label="Filter by category">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="Education">Education</button>
            <button class="filter-tab" data-filter="Web Development">Web Dev</button>
            <button class="filter-tab" data-filter="Programming">Programming</button>
            <button class="filter-tab" data-filter="Database">Database</button>
            <button class="filter-tab" data-filter="AI">AI</button>
            <button class="filter-tab" data-filter="Tools">Tools</button>
          </div>
          <div class="search-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="search" class="search-input" id="cert-search" placeholder="Search certifications..." aria-label="Search certifications"/>
          </div>
        </div>

        <div class="certs-grid" id="certs-grid" aria-label="Certifications" aria-live="polite"></div>
      </div>
    </section>

  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="cert-modal" role="dialog" aria-modal="true" aria-label="Certification detail">
    <div class="modal">
      <div class="modal-header">
        <h2 style="font-size:1rem;font-weight:700">Certificate Detail</h2>
        <button class="modal-close btn-icon" id="modal-close-btn" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <footer role="contentinfo"></footer>

  <script type="module">
    import { initTheme, initCursor, initScrollProgress, initNavbar, initBackToTop, fetchData, debounce } from './assets/js/main.js';
    import { injectLayout } from './assets/js/layout.js';
    import { initCommandPalette } from './assets/js/command-palette.js';
    import { initHeroReveal, initCounters } from './assets/js/animations.js';

    injectLayout();
    initTheme();
    initNavbar();
    initScrollProgress();
    initBackToTop();
    initCommandPalette();
    initCursor();
    initHeroReveal();
    initCounters();

    let allCerts = [];
    let activeFilter = 'all';
    let searchQuery  = '';

    async function init() {
      allCerts = await fetchData('assets/data/certifications.json') || [];
      render();
    }

    function render() {
      const grid = document.getElementById('certs-grid');
      if (!grid) return;

      let filtered = allCerts;
      if (activeFilter !== 'all') filtered = filtered.filter(c => c.category === activeFilter);
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(c =>
          c.title.toLowerCase().includes(q) ||
          c.issuer.toLowerCase().includes(q) ||
          c.skills.some(s => s.toLowerCase().includes(q))
        );
      }

      if (!filtered.length) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-secondary)"><div style="font-size:2.5rem;margin-bottom:1rem">🔍</div><p>No certifications match your search.</p></div>`;
        return;
      }

      grid.innerHTML = filtered.map((c, i) => `
        <div class="cert-card-full" data-id="${c.id}" style="animation-delay:${i*60}ms" role="button" tabindex="0" aria-label="View ${c.title} details">
          <span class="cert-category-badge">${c.category}</span>
          <div class="cert-card-icon" aria-hidden="true">${c.icon}</div>
          <div class="cert-card-title">${c.title}</div>
          <div class="cert-card-issuer">${c.issuer}</div>
          <div class="cert-card-date">${c.date}</div>
          <p class="cert-card-desc">${c.description}</p>
          <div class="cert-card-skills">
            ${c.skills.map(s => `<span class="tag">${s}</span>`).join('')}
          </div>
        </div>
      `).join('');

      // Click listeners
      grid.querySelectorAll('.cert-card-full').forEach(card => {
        const open = () => openModal(parseInt(card.dataset.id));
        card.addEventListener('click', open);
        card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') open(); });
      });
    }

    function openModal(id) {
      const cert = allCerts.find(c => c.id === id);
      if (!cert) return;
      const body = document.getElementById('modal-body');
      body.innerHTML = `
        <div class="modal-cert-icon" aria-hidden="true">${cert.icon}</div>
        <div class="modal-cert-title">${cert.title}</div>
        <div class="modal-cert-issuer">${cert.issuer}</div>
        <div class="modal-cert-date">${cert.date} · ${cert.category}</div>
        <p class="modal-cert-desc">${cert.description}</p>
        <div class="modal-cert-skills">
          ${cert.skills.map(s => `<span class="tag">${s}</span>`).join('')}
        </div>
      `;
      document.getElementById('cert-modal')?.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('cert-modal')?.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modal-close-btn')?.addEventListener('click', closeModal);
    document.getElementById('cert-modal')?.addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    document.getElementById('cert-filters')?.addEventListener('click', e => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeFilter = tab.dataset.filter;
      render();
    });

    document.getElementById('cert-search')?.addEventListener('input', debounce(e => {
      searchQuery = e.target.value.trim();
      render();
    }, 200));

    init();
  </script>
</body>
</html>
